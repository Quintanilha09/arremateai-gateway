server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: arremateai-gateway

  cloud:
    gateway:
      # CORS configurado no gateway (não precisa nos microsserviços)
      # Em produção, sobrescreva via variáveis de ambiente:
      #   SPRING_CLOUD_GATEWAY_GLOBALCORS_CORS-CONFIGURATIONS_[/**]_ALLOWEDORIGINS_0=https://app.arremateai.com.br
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "Authorization"
              - "Content-Type"
              - "Accept"
              - "X-Requested-With"
              - "X-Device-Token"
            allowCredentials: true
            maxAge: 3600

      routes:
        # ===== IDENTITY SERVICE (auth) =====
        - id: identity-service
          uri: ${IDENTITY_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/${segment}

        # ===== MEDIA SERVICE (upload de arquivos e servição de estáticos) =====
        - id: media-service-api
          uri: ${MEDIA_URL:http://localhost:8083}
          predicates:
            - Path=/api/media/**
          order: 5

        - id: media-service-uploads
          uri: ${MEDIA_URL:http://localhost:8083}
          predicates:
            - Path=/uploads/**
          order: 6

        # ===== PROPERTY CATALOG SERVICE (imóveis e localização) =====
        - id: property-catalog-service
          uri: ${PROPERTY_CATALOG_URL:http://localhost:8082}
          predicates:
            - Path=/api/imoveis/**, /api/localizacao/**
          order: 10

        # ===== VENDOR SERVICE (vendedores) =====
        - id: vendor-service
          uri: ${VENDOR_URL:http://localhost:8084}
          predicates:
            - Path=/api/vendedores/**, /api/admin/vendedores/**

        # ===== USER PROFILE SERVICE (perfil, configurações, favoritos) =====
        - id: user-profile-service
          uri: ${USERPROFILE_URL:http://localhost:8085}
          predicates:
            - Path=/api/perfil/**, /api/configuracoes/**, /api/favoritos/**

        # ===== ORCHESTRATOR SERVICE (BFF) =====
        - id: orchestrator-service
          uri: ${ORCHESTRATOR_URL:http://localhost:8087}
          predicates:
            - Path=/api/orchestrator/**
          order: 1

        # ===== NOTIFICATION SERVICE =====
        - id: notification-service
          uri: ${NOTIFICATION_URL:http://localhost:8086}
          predicates:
            - Path=/api/notificacoes/**

        # ===== SCRAPER SERVICE (scraping de leilões com IA) =====
        - id: scraper-service
          uri: ${SCRAPER_URL:http://localhost:8088}
          predicates:
            - Path=/api/scraper/**
          filters:
            - RewritePath=/api/scraper/(?<segment>.*), /${segment}

        # ===== MONOLITH (fallback durante migração) =====
        # Remover após migração completa de todos os serviços
        - id: monolith-fallback
          uri: ${MONOLITH_URL:http://localhost:8090}
          predicates:
            - Path=/**
          order: 9999

# JWT (mesma chave do identity service — OBRIGATÓRIO, sem default)
jwt:
  secret: ${JWT_SECRET}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    gateway:
      enabled: false

logging:
  level:
    com.arremateai.gateway: DEBUG
    org.springframework.cloud.gateway: INFO

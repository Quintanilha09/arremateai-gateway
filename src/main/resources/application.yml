server:
  port: 8080

spring:
  application:
    name: arremateai-gateway

  cloud:
    gateway:
      # CORS configurado no gateway (não precisa nos microsserviços)
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:4200"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "Authorization"
              - "Content-Type"
              - "Accept"
              - "X-Requested-With"
              - "X-Device-Token"
            allowCredentials: true
            maxAge: 3600

      routes:
        # ===== IDENTITY SERVICE (auth) =====
        - id: identity-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - RewritePath=/api/auth/(?<segment>.*), /api/auth/${segment}

        # ===== MEDIA SERVICE (upload de arquivos e servição de estáticos) =====
        - id: media-service-api
          uri: http://localhost:8083
          predicates:
            - Path=/api/media/**
          order: 5

        - id: media-service-uploads
          uri: http://localhost:8083
          predicates:
            - Path=/uploads/**
          order: 6

        # ===== PROPERTY CATALOG SERVICE (imóveis e localização) =====
        - id: property-catalog-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/imoveis/**, /api/localizacao/**
          order: 10

        # ===== VENDOR SERVICE (vendedores) =====
        - id: vendor-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/vendedores/**, /api/admin/vendedores/**

        # ===== USER PROFILE SERVICE (perfil, configurações, favoritos) =====
        - id: user-profile-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/perfil/**, /api/configuracoes/**, /api/favoritos/**

        # ===== ORCHESTRATOR SERVICE (BFF) =====
        - id: orchestrator-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/orchestrator/**
          order: 1

        # ===== NOTIFICATION SERVICE =====
        - id: notification-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/notificacoes/**

        # ===== MONOLITH (fallback durante migração) =====
        # Remover após migração completa de todos os serviços
        - id: monolith-fallback
          uri: http://localhost:8090
          predicates:
            - Path=/**
          order: 9999

# JWT (mesma chave do identity service)
jwt:
  secret: ${JWT_SECRET}

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    gateway:
      enabled: false

logging:
  level:
    com.arremateai.gateway: DEBUG
    org.springframework.cloud.gateway: INFO
